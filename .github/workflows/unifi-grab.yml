name: Generate Unifi EPG

on:
  schedule:
    # Berjalan setiap 6 jam
    - cron: '0 */6 * * *'
  # Membolehkan butang "Run workflow" di tab Actions
  workflow_dispatch:

# PENTING: Memberi kebenaran untuk bot menolak (push) kod ke repo
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Memastikan token digunakan untuk akses push
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Unifi Scraper
        # Pastikan path ke skrip python anda betul
        run: python scripts/unifi_scraper.py

      - name: Commit and Push Changes
        run: |
          # Konfigurasi identiti bot
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Tambah fail yang dihasilkan
          git add unifi.xml
          
          # Semak jika ada perubahan. Jika tiada, skrip tidak akan ralat.
          if git diff --staged --quiet; then
            echo "Tiada perubahan dikesan pada unifi.xml. Melangkau commit."
          else
            git commit -m "Auto-update unifi.xml: $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
