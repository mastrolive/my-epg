name: Generate Unifi EPG

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Mengambil semua sejarah untuk elak isu push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Scraper
        run: |
          mkdir -p scripts
          python scripts/unifi_scraper.py

      - name: Commit and Push
        run: |
          # 1. Set identiti bot (Wajib untuk elak ralat 128)
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # 2. Tambah fail
          git add unifi.xml
          
          # 3. Semak jika ada perubahan sebelum commit
          if git diff --staged --quiet; then
            echo "Tiada perubahan pada unifi.xml. Melangkau..."
          else
            git commit -m "Auto-update unifi.xml: $(date +'%Y-%m-%d %H:%M')"
            # 4. Tolak ke branch semasa secara spesifik
            git push origin HEAD
          fi
