name: Generate Unifi EPG

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Memastikan bot mempunyai kuasa menulis
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Menggunakan GITHUB_TOKEN untuk pengesahan automatik
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Scraper
        run: |
          mkdir -p scripts
          python scripts/unifi_scraper.py

      - name: Commit and Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Set identiti Git
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # Tambah fail unifi.xml
          git add unifi.xml
          
          # Hanya commit jika ada perbezaan
          if git diff --staged --quiet; then
            echo "Tiada perubahan dikesan pada unifi.xml"
          else
            git commit -m "Auto-update unifi.xml: $(date)"
            # Push menggunakan token secara eksplisit untuk elak ralat 128
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref_name }}
          fi
