name: Sync Unifi API

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Requests
        run: pip install requests

      - name: Run Scraper
        run: python scripts/unifi_scraper.py

      - name: Commit and Push
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "Unifi-Bot"
          git add unifi.xml
          git commit -m "Kemas kini EPG dari Quickplay API: $(date)" || exit 0
          git push
