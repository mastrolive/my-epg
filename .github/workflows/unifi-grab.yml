name: Generate Unifi EPG

on:
  schedule:
    - cron: '0 */6 * * *' # Berjalan secara automatik setiap 6 jam
  workflow_dispatch:      # Membolehkan anda tekan butang "Run" secara manual

permissions:
  contents: write         # Memberi kebenaran menulis fail ke repo

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Unifi Scraper
        run: |
          # Memastikan folder scripts wujud sebelum menjalankan skrip
          mkdir -p scripts
          python scripts/unifi_scraper.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Tambah fail unifi.xml ke dalam staging area
          git add unifi.xml
          
          # Logik untuk semak jika ada perubahan atau tidak
          if git diff --staged --quiet; then
            echo "Tiada perubahan pada fail XML. Melangkau commit."
          else
            git commit -m "Auto-update unifi.xml: $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
