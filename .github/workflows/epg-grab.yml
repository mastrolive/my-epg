            "https://epg.pw/api/epg.xml?channel_id=412112" # Hbo Signature
            "https://epg.pw/api/epg.xml?channel_id=524095" # Tvone
            "https://epg.pw/api/epg.xml?channel_id=524037" # Tvri
            "https://epg.pw/api/epg.xml?channel_id=524021" # Zee Bioskop
            "https://epg.pw/api/epg.xml?channel_id=524084" # Kix
            "https://epg.pw/api/epg.xml?channel_id=524176" # Rock Entertainment
            "https://epg.pw/api/epg.xml?channel_id=524158" # Musik Indonesia
            "https://epg.pw/api/epg.xml?channel_id=463924" # Ten 1
            "https://epg.pw/api/epg.xml?channel_id=524074" # Animal Planet
            "https://epg.pw/api/epg.xml?channel_id=524006" # Curiosity
            "https://epg.pw/api/epg.xml?channel_id=465186" # Travel Ch
            "https://epg.pw/api/epg.xml?channel_id=524023" # Horee
            "https://epg.pw/api/epg.xml?channel_id=464925" # Pbs Kids
            "https://epg.pw/api/epg.xml?channel_id=465214" # Fox Soccer Plus
            "https://epg.pw/api/epg.xml?channel_id=219100" # Premier Sports 1
            "https://epg.pw/api/epg.xml?channel_id=219104" # Premier Sports 2
            "https://epg.pw/api/epg.xml?channel_id=535446" # Astro Fam Time
          )

          for url in "${urls[@]}"; do
            FILENAME="temp_epg/$(uuidgen).xml"
            curl -A "Mozilla/5.0" --connect-timeout 30 --retry 5 --retry-delay 5 -sL "$url" > "$FILENAME"
            
            # Padam file jika saiz terlalu kecil (biasanya ralat API)
            if [ $(stat -c%s "$FILENAME") -lt 800 ]; then
              rm "$FILENAME"
            fi
            sleep 1.2
          done

          # Cipta fail epg.xml yang baru
          echo '<?xml version="1.0" encoding="UTF-8"?>' > epg.xml
          echo '<tv generator-info-name="Gemini-Fixed-EPG">' >> epg.xml
          
          # Ekstrak Nama Channel dengan blok lengkap
          for f in temp_epg/*.xml; do
            sed -n '/<channel/,/<\/channel>/p' "$f" >> epg.xml || true
          done

          # Ekstrak Program dengan blok lengkap
          for f in temp_epg/*.xml; do
            # Gunakan sed untuk ambil blok program, buang tag XML yang tak perlu
            sed -n '/<programme/,/<\/programme>/p' "$f" | grep -vE '(\?xml|<tv|<\/tv)' >> epg.xml || true
          done
          
          echo '</tv>' >> epg.xml

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          rm -rf grabber temp_epg
          
          # Buang fail lama yang tidak digunakan
          git rm vidio.xml indonesia3.xml sooka.xml rctiplus.xml external_epg.xml myepg.xml cignal.xml starhub.xml --ignore-unmatch
          
          git add mewatch.xml rtmklik.xml epg.xml
          
          TIMESTAMP=$(date -u -d "+8 hours" "+%d-%m-%Y %H:%M MYT")
          git commit -m "Update EPG: $TIMESTAMP" || exit 0
          git push
