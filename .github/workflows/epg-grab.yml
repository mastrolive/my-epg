            "https://epg.pw/api/epg.xml?channel_id=524124" # Sportstar1
            "https://epg.pw/api/epg.xml?channel_id=524003" # Sportstar2
            "https://epg.pw/api/epg.xml?channel_id=524184" # Sportstar3
            "https://epg.pw/api/epg.xml?channel_id=524033" # Sportstar4
            "https://epg.pw/api/epg.xml?channel_id=426062" # Sportv
            "https://epg.pw/api/epg.xml?channel_id=400477" # Tnt 1
