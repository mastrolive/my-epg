name: Update EPG

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  grab:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Grab Astro, Mewatch & RTMKlik
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git grabber
          cd grabber
          npm install
          export TZ="Asia/Kuala_Lumpur"

          # Mencipta senarai saluran Astro
          mkdir -p sites/astro.com.my
          cat <<EOF > sites/astro.com.my/astro.com.my.channels.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <channels>
            <channel site="astro.com.my" lang="ms" xmltv_id="104.astro" site_id="104">Astro Ria</channel>
            <channel site="astro.com.my" lang="ms" xmltv_id="105.astro" site_id="105">Astro Prima</channel>
            <channel site="astro.com.my" lang="ms" xmltv_id="108.astro" site_id="108">Astro Citra</channel>
            <channel site="astro.com.my" lang="ms" xmltv_id="501.astro" site_id="501">Astro Awani</channel>
            <channel site="astro.com.my" lang="ms" xmltv_id="611.astro" site_id="611">Astro Ceria</channel>
            <channel site="astro.com.my" lang="ms" xmltv_id="306.astro" site_id="306">Astro AEC</channel>
            <channel site="astro.com.my" lang="ms" xmltv_id="201.astro" site_id="201">Astro Vaanavil</channel>
            <channel site="astro.com.my" lang="ms" xmltv_id="202.astro" site_id="202">Astro Vinmeen HD</channel>
            <channel site="astro.com.my" lang="ms" xmltv_id="801.astro" site_id="801">Astro Arena</channel>
            <channel site="astro.com.my" lang="ms" xmltv_id="802.astro" site_id="802">Astro Arena 2</channel>
            <channel site="astro.com.my" lang="ms" xmltv_id="805.astro" site_id="805">Astro Grandstand</channel>
            <channel site="astro.com.my" lang="ms" xmltv_id="811.astro" site_id="811">Astro Premier League</channel>
            <channel site="astro.com.my" lang="ms" xmltv_id="812.astro" site_id="812">Astro Premier League 2</channel>
            <channel site="astro.com.my" lang="ms" xmltv_id="814.astro" site_id="814">Astro Football</channel>
            <channel site="astro.com.my" lang="ms" xmltv_id="815.astro" site_id="815">Astro Sports Plus</channel>
          </channels>
          EOF

          # Jalankan proses grab dengan toleransi ralat (|| true)
          npm run grab -- --site=astro.com.my --days=2 --output=../astro.xml || echo "Astro Grab Gagal"
          npm run grab -- --site=mewatch.sg --days=2 --output=../mewatch.xml || echo "Mewatch Grab Gagal"
          npm run grab -- --site=rtmklik.rtm.gov.my --days=2 --output=../rtmklik.xml || echo "RTMKlik Grab Gagal"
          cd ..

      - name: Download and Combine epg.pw
        run: |
          sudo apt-get update && sudo apt-get install -y uuid-runtime
          mkdir -p temp_epg
          
          urls=(
            "https://epg.pw/api/epg.xml?channel_id=412113" # Sensasi
            "https://epg.pw/api/epg.xml?channel_id=463834" # Jaya
            "https://epg.pw/api/epg.xml?channel_id=464138" # J Movie
            "https://epg.pw/api/epg.xml?channel_id=411774" # Zee Thirai
            "https://epg.pw/api/epg.xml?channel_id=369742" # Citradrama
            "https://epg.pw/api/epg.xml?channel_id=412104" # Citraenter
            "https://epg.pw/api/epg.xml?channel_id=464884" # NatGeo
            "https://epg.pw/api/epg.xml?channel_id=465006" # Usa Network
            "https://epg.pw/api/epg.xml?channel_id=412140" # Hub Premier 1
            "https://epg.pw/api/epg.xml?channel_id=412164" # Hub Premier 2
            "https://epg.pw/api/epg.xml?channel_id=450711" # Hub Premier 3
          )

          for url in "${urls[@]}"; do
            curl --connect-timeout 15 --retry 3 -sL "$url" > "temp_epg/$(uuidgen).xml" || echo "Gagal download $url"
            sleep 0.5
          done

          echo '<?xml version="1.0" encoding="UTF-8"?>' > epg.xml
          echo '<tv generator-info-name="epg.pw-Combined">' >> epg.xml
          grep -h "<channel" temp_epg/*.xml -A 2 | grep -vE "<\?xml|<\/tv>|<tv|--" >> epg.xml || true
          grep -h "<programme" temp_epg/*.xml -A 10 | grep -vE "<\?xml|<\/tv>|<tv|--" >> epg.xml || true
          echo '</tv>' >> epg.xml

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          rm -rf grabber temp_epg
          
          # Gunakan git add -A untuk memastikan semua fail baru dikesan
          git add astro.xml mewatch.xml rtmklik.xml epg.xml || true
          
          TIMESTAMP=$(date -u -d "+8 hours" "+%d-%m-%Y %H:%M MYT")
          git commit -m "Update EPG: $TIMESTAMP" || echo "Tiada perubahan untuk di-commit"
          git push || echo "Push gagal"
