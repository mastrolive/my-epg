            "https://epg.pw/api/epg.xml?channel_id=219104" # Premier Sports 2
            "https://epg.pw/api/epg.xml?channel_id=370131" # Tv6
            "https://epg.pw/api/epg.xml?channel_id=370132" # Berita Rtm
            "https://epg.pw/api/epg.xml?channel_id=370133" # Sukan Rtm
            "https://epg.pw/api/epg.xml?channel_id=492817" # Vasantham
          )

          for url in "${urls[@]}"; do
            FILENAME="temp_epg/$(uuidgen).xml"
            curl -A "Mozilla/5.0" --connect-timeout 30 --retry 5 --retry-delay 5 -sL "$url" > "$FILENAME"
            
            if [ $(stat -c%s "$FILENAME") -lt 800 ]; then
              rm "$FILENAME"
            fi
            sleep 1.2
          done

          echo '<?xml version="1.0" encoding="UTF-8"?>' > epg.xml
          echo '<tv generator-info-name="Gemini-Fixed-EPG">' >> epg.xml
          
          for f in temp_epg/*.xml; do
            sed -n '/<channel/,/<\/channel>/p' "$f" >> epg.xml || true
          done

          for f in temp_epg/*.xml; do
            sed -n '/<programme/,/<\/programme>/p' "$f" | grep -vE '(\?xml|<tv|<\/tv)' >> epg.xml || true
          done
          
          echo '</tv>' >> epg.xml

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          rm -rf temp_epg
          
          # Bersihkan fail lama yang sudah tidak relevan
          git rm mewatch.xml rtmklik.xml vidio.xml indonesia3.xml sooka.xml rctiplus.xml external_epg.xml myepg.xml cignal.xml starhub.xml --ignore-unmatch
          
          git add epg.xml
          
          TIMESTAMP=$(date -u -d "+8 hours" "+%d-%m-%Y %H:%M MYT")
          git commit -m "Update EPG (epg.pw): $TIMESTAMP" || exit 0
          git push
