            "https://epg.pw/api/epg.xml?channel_id=400479" # Tnt 3
            "https://epg.pw/api/epg.xml?channel_id=400478" # Tnt 4
            "https://epg.pw/api/epg.xml?channel_id=465006" # Usa Network
            "https://epg.pw/api/epg.xml?channel_id=524181" # Dunia Lain
