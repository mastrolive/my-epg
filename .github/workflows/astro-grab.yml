name: Update Astro EPG

on:
  schedule:
    # Berjalan setiap hari jam 12:00 AM waktu Malaysia (16:00 UTC)
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  grab:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Grab All Astro Channels
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git grabber
          cd grabber
          npm install

          # Arahan ini akan menarik SEMUA saluran yang tersenarai dalam 
          # sites/content.astro.com.my/content.astro.com.my.channels.xml secara automatik
          npm run grab -- --site=content.astro.com.my --days=2 --output=../astro.xml

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [ -f astro.xml ]; then
            # Padam folder grabber sebelum push untuk jimat ruang
            rm -rf grabber
            git add astro.xml
            TIMESTAMP=$(date -u -d "+8 hours" "+%d-%m-%Y %H:%M MYT")
            git commit -m "Update All Astro Channels: $TIMESTAMP" || exit 0
            git push
          else
            echo "Fail astro.xml tidak berjaya dijana."
            exit 1
          fi
