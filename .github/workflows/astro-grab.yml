name: Update Astro EPG

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  grab:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Grab Astro EPG
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git grabber
          cd grabber
          npm install

          # Menggunakan site config rasmi: content.astro.com.my
          # Kita tidak perlu cipta fail .xml secara manual jika senarai channel sudah ada di iptv-org
          # Tetapi jika anda mahu tapis channel tertentu sahaja, kita guna --channels
          
          npm run grab -- --site=content.astro.com.my --days=2 --output=../astro.xml

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [ -f astro.xml ]; then
            git add astro.xml
            TIMESTAMP=$(date -u -d "+8 hours" "+%d-%m-%Y %H:%M MYT")
            git commit -m "Update Astro EPG: $TIMESTAMP" || exit 0
            git push
          else
            echo "Ralat: Fail astro.xml tidak berjaya dijana."
            exit 1
          fi
